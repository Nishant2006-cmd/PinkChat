<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkchat - Sign Up</title>
    <!-- Moved Bootstrap link to the HEAD where it belongs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Custom cute pink background since $pink-300 won't work inline */
        .pink-bg {
            background-color: #ffccd5; /* Soft, cute pink */
            min-height: 100vh;
            padding: 20px;
        }
        /* Style the form to make it look clean */
        .signup-form-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            margin: 20px auto;
        }
    </style>
</head>
<body>

  <!-- This div now properly wraps your content with a pink background -->
  <div class="pink-bg">
    
    <!-- Navbar (Fixed missing </a> tag) -->
    <nav class="navbar bg-body-tertiary rounded-3 mb-4 container">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <!-- Added height so the logo isn't massive -->
          <img src="static/pinklogo.png" alt="Pinkchat Logo" height="40"> 
        </a>
      </div>
    </nav>

    <div class="text-center">
        <h1 class="display-4 fw-bold text-danger-emphasis">PINK CHAT</h1>
        <h2>Sign Up</h2>
        <p class="lead">Go for it</p>
        <h3 class="text-danger">{{ message }}</h3>
    </div>

    <!-- Signup Form styled neatly with Bootstrap -->
    <div class="signup-form-container">
        <form method="post" action="/signup">
            <div class="mb-3">
                <label class="form-label">Username:</label>
                <input type="text" name="username" class="form-control">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" name="email" class="form-control">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password:</label>
                <input type="password" name="password" class="form-control">
            </div>
            
            <button type="submit" class="btn btn-danger w-100 style="background-color: #ff4d6d;">SUBMIT</button>
        </form>
    </div>

  </div>
  <div class="text-center mt-3">
    <a href="/login" class="text-decoration-none text-danger-emphasis small">
        &larr; Already have an account? Login
    </a>
</div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
