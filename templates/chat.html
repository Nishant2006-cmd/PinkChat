<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINK CHAT</title>
    <!-- Bootstrap CSS for layout structures -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffccd5; /* Matching aesthetic pink background */
            color: #333;
            height: 100vh;
        }

        .chat-container {
            max-width: 800px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            box-shadow: 0px 8px 30px rgba(255, 77, 109, 0.15);
        }

        .chat-header {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .btn-leave {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-leave:hover {
            background: white;
            color: #ff4d6d;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fff5f6; /* Super soft inner room background */
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Base chat bubble alignment styling */
        .message {
            padding: 12px 16px;
            border-radius: 18px;
            width: fit-content;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            background: #ffffff; 
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        /* Style for when current user sends a message */
        .message.my-msg {
            background: #ff4d6d;
            color: white;
            border-radius: 18px;
            border-bottom-right-radius: 4px;
            border-bottom-left-radius: 18px;
            align-self: flex-end;
        }

        .message.my-msg b {
            color: #ffe5ec !important;
        }

        .message b {
            color: #af7f88;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 4px;
        }

        .message img {
            width: 100%;
            max-width: 250px;
            border-radius: 12px;
            margin-top: 5px;
            margin-bottom: 5px;
            display: block;
        }

        /* Form footer matching your original background styling rules */
        .message-form {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #ffffff;
            border-top: 1px solid #ffe5ec;
        }

        /* Standard buttons matched to theme */
        .message-form button {
            background: #ebb3bd;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .message-form button:hover {
            background: #b0878f;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-thumb {
            background-color: #ffccd5;
            border-radius: 10px;
        }
        /* Styles the text message input field */
#message_input {
    flex: 1;
    padding: 12px 20px;
    border: 2px solid #ffe5ec;
    border-radius: 25px; /* Makes it a clean pill shape */
    outline: none;
    font-size: 0.95rem;
    transition: all 0.2s ease;
}

#message_input:focus {
    border-color: #bb949b; /* Glows pink when you click it */
    background-color: #fffdfd;
}

/* Styles the default browser "Choose File" button container */
#image_input {
    padding: 8px;
    background: #fff5f6;
    border: 2px dashed #ffe5ec; /* Gives it a cute dashed border vibe */
    border-radius: 15px;
    cursor: pointer;
    font-size: 0.85rem;
    color: #ff4d6d;
    max-width: 220px; /* Keeps it from stretching too wide */
}

/* Customizes the actual inner button inside the file input browser */
#image_input::file-selector-button {
    background: #552f36;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    margin-right: 10px;
    transition: background 0.2s;
}

#image_input::file-selector-button:hover {
    background: #c09da3;
}
/* Poore body ya wrapper ko hamesha screen ke andar rakhne ke liye */
.chat-container {
    display: flex;
    flex-direction: column;
    height: 100vh; /* Mobile screen ki full height lega */
    max-width: 800px;
    margin: 0 auto; /* Yeh desktop aur mobile dono par automatically center karega */
    padding: 10px;
    box-sizing: border-box;
}

/* Chat Messages Area - Jo scroll hota hai */
.messages-box {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    margin-bottom: 70px; /* Neeche input bar ke liye fix space */
}

/* Typing / Input Bar Footer - Jo hamesha screen ke bottom par chipka rahega */
.input-bar-container {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%); /* Bilkul center mein alignment ke liye */
    width: 100%;
    max-width: 800px; /* Jitna chat box bada hai utna hi input area hoga */
    background: #fff;
    padding: 10px;
    box-sizing: border-box;
    display: flex;
    gap: 8px;
    align-items: center;
}

/* Input text area ko screen ke hisab se stretch karne ke liye */
.input-bar-container input[type="text"] {
    flex: 1;
    min-width: 0; /* Mobile par width collapse hone se bachayega */
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ffb6c1;
}

.messages img {
    cursor: zoom-in;
    transition: transform 0.15s ease-in-out; /* Thoda fast aur smooth pop-up */
    max-width: 180px;
    border-radius: 8px;
    display: inline-block;
}

.messages img:active {
    transform: scale(1.25); /* Sirf 25% bada hoga, bilkul halka aur safe zoom */
    z-index: 99; /* Apne aas-paas ke text ke upar dikhega */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); /* Piche halki shadow takki alag se dikhe */
}
     .dark-mode {
    background-color: #121212;
    color: white;
}

.dark-mode .chat-container {
    background: #a28888;
}

.dark-mode .messages {
    background: #181818;
}

.dark-mode .message {
    background: #2b2b2b;
    color: white;
}

.dark-mode .message.my-msg {
    background: #aa848b;
}

.dark-mode .message-form {
    background: #635959;
}

.dark-mode input {
    background: #312121;
    color: grey;
    border: 1px solid #756d6d;
}
    </style>
</head>
<body>


<button id="darkModeBtn">🌙NIGHT</button>

<div class="room-header" style="display: flex; justify-content: space-between; align-items: center; background: #ff69b4; color: white; padding: 10px 15px; border-radius: 10px 10px 0 0;">
    <h3 style="margin: 0;">💞 Room: {{ room }}</h3>
    
</div>

<div id="membersModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; box-shadow: 0px 5px 25px rgba(0,0,0,0.3); z-index: 10000; width: 290px; font-family: sans-serif;">
    <h3 style="margin-top: 0; border-bottom: 2px solid #ffb6c1; padding-bottom: 8px; color: #ff1493;">Active Members</h3>
    <ul id="members-list-ul" style="list-style: none; padding: 0; max-height: 200px; overflow-y: auto; margin-bottom: 15px;">
        </ul>
    <button onclick="toggleMembersModal()" style="background: #ff69b4; color: white; border: none; padding: 8px 10px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer;">Close</button>
</div>




<div class="room-header" style="display: flex; justify-content: space-between; align-items: center;">
    <h2>💞 Room: <span id="room-name-display">{{ room_name }}</span></h2>
    <button onclick="toggleMembersModal()" style="background: rgba(255,255,255,0.3); border: none; padding: 5px 10px; border-radius: 15px; color: white; cursor: pointer;">
        👥 <span id="live-count">0</span> Live
    </button>
</div>

<div id="membersModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 15px rgba(0,0,0,0.2); z-index: 1000; width: 280px;">
    <h3>Active Members</h3>
    <ul id="members-list-ul" style="list-style: none; padding: 0;"></ul>
    <button onclick="toggleMembersModal()" style="background: #ff69b4; color: white; border: none; padding: 5px 10px; border-radius: 5px; margin-top: 10px; width: 100%;">Close</button>
</div>
<div class="chat-container">

    <!-- Header Section -->
    <div class="chat-header">
        <h2>💞 Room: {{ room }}</h2>
        <button class="btn-leave" onclick="leaveRoom()">Leave</button>
    </div>

    <!-- Messages Window -->
    <div id="messages" class="messages">
        {% for message in messages %}
            <div class="message {% if message.sender == username %}my-msg{% endif %}">
                <b>{{ message.sender }}:</b>
                <br>
                {% if message.image %}
                    <img src="{{ message.image }}">
                    <br>
                {% endif %}
                {{ message.text }}
            </div>
        {% endfor %}
    </div>

    <!-- Message Inputs Footer Section (RESTORED EXACTLY AS ORIGINAL) -->
    <form id="message_input_form" class="message-form">
    <input
        type="text"
        id="message_input"
        placeholder="Enter message..."
        autocomplete="off"
    >

    <input
        type="file"
        id="image_input"
        accept="image/*"
    >

    <button type="submit">
        SEND
    </button>
</form>

</div>

<!-- Realtime Scripts Implementation -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
// 1. Sabse pehle socket ko initialize karo taaki niche ke listeners sahi chalein
const socket = io();

// 2. Flask se aaye hue logged-in username ko variable me set karo
const current_user = "{{ username }}";

// Auto-scroll logic initialization to view recent messages immediately
const messagesContainer = document.getElementById('messages');
if (messagesContainer) {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// 3. Socket Connection Lifecycle Events
socket.on('connect', function(){
    console.log("CONNECTED TO SERVER SUCCESSFULLY");
    socket.emit('join_room', {
        username: current_user,
        room: "{{ room }}"
    });
});

// Join personal notification channel
socket.emit('join_personal_room', {
    username: current_user
});

// 4. Global Room Stats Receiver (Sirf random chat room ke live status ke liye)
socket.on('global_room_stats', function(data) {
    const liveCountEl = document.getElementById('live-count');
    if (liveCountEl) {
        liveCountEl.innerText = data.count;
    }
    
    let listUl = document.getElementById('members-list-ul');
    if (listUl) {
        listUl.innerHTML = ''; 
        data.users.forEach(user => {
            if(user !== current_user) {
                listUl.innerHTML += `
                    <li style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; color: #333; border-bottom: 1px solid #ffe4e1; padding-bottom: 5px;">
                        <strong>${user}</strong>
                        <button onclick="sendFriendRequest('${user}')" style="background: #ff1493; color: white; border: none; padding: 4px 12px; border-radius: 12px; font-size: 11px; cursor: pointer;">Add Friend</button>
                    </li>
                `;
            } else {
                listUl.innerHTML += `<li style="margin-bottom: 8px; color: #888; padding-bottom: 5px;"><span>${user} (You)</span></li>`;
            }
        });
    }
});

// Jo user aaya/gaya uski announcement updates
socket.on('join_room_announcement', function(data) {
    const messages = document.getElementById('messages');
    if (messages) {
        const announcementNode = document.createElement('div');
        announcementNode.className = "message system-msg";
        announcementNode.style.textAlign = "center";
        announcementNode.style.color = "#ff69b4";
        announcementNode.style.fontStyle = "italic";
        announcementNode.innerHTML = `<b>${data.username}</b> has joined the chat! 👋`;
        messages.appendChild(announcementNode);
        messages.scrollTop = messages.scrollHeight;
    }
});

socket.on('leave_room_announcement', function(data) {
    const messages = document.getElementById('messages');
    if (messages) {
        const announcementNode = document.createElement('div');
        announcementNode.className = "message system-msg";
        announcementNode.style.textAlign = "center";
        announcementNode.style.color = "#999";
        announcementNode.style.fontStyle = "italic";
        announcementNode.innerHTML = `<b>${data.username}</b> has left the chat. 🏃‍♂️`;
        messages.appendChild(announcementNode);
        messages.scrollTop = messages.scrollHeight;
    }
});

// Receive Dynamic Incoming Chat Messages
socket.on('receive_message', function(data){
    const messages = document.getElementById('messages');
    if (!messages) return;
    
    const newNode = document.createElement('div');
    const isMe = data.username === current_user;
    newNode.className = isMe ? "message my-msg" : "message";

    let html = `<b>${data.username}:</b><br>`;
    if(data.image){
        html += `<img src="${data.image}" width="200"><br>`;
    }
    if(data.message){

    // Detect gif/image URLs automatically
    if(
        data.message.includes(".gif") ||
        data.message.includes(".png") ||
        data.message.includes(".jpg") ||
        data.message.includes(".jpeg") ||
        data.message.includes("giphy.com")
    ){

        html += `<img src="${data.message}" width="200"><br>`;

    } else {

        html += `${data.message}`;
    }
}

    newNode.innerHTML = html;
    messages.appendChild(newNode);
    messages.scrollTop = messages.scrollHeight;
});


// 5. Native DOM Forms submission events (Message Send Handler)
document.getElementById('message_input_form').onsubmit = function(e){
    e.preventDefault();

    let messageInput = document.getElementById('message_input');
    let message = messageInput ? messageInput.value : '';
    let imageInput = document.getElementById('image_input');
    let file = imageInput ? imageInput.files[0] : null;

    if(file){
        
         if(file.size > 10 * 1024 * 1024){
        alert("Maximum image size is 10MB");
        return;
    }

        const reader = new FileReader();
        reader.onload = function(){
            socket.emit('send_message', {
                username: current_user,
                room: "{{ room }}",
                message: message,
                image: reader.result,
                audio: null
            });
        };
        reader.readAsDataURL(file);
    } else {
        if (message.trim() === "") return; // Khali message block karo
        socket.emit('send_message', {
            username: current_user,
            room: "{{ room }}",
            message: message,
            image: null,
            audio: null
        });
    }

    if(messageInput) messageInput.value = '';
    if(imageInput) imageInput.value = '';
};
const darkBtn = document.getElementById("darkModeBtn");

darkBtn.onclick = function(){

    document.body.classList.toggle("dark-mode");

    // Save preference
    if(document.body.classList.contains("dark-mode")){
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
};
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark-mode");
}

// 6. Custom Interface Controller Operations (Modal and Friend Request Bypass)
function toggleMembersModal() {
    let modal = document.getElementById('membersModal');
    if (modal) {
        modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
    }
}


function sendFriendRequest(targetUser) {
    socket.emit('add_friend_instant', {
        username: current_user,
        target: targetUser
    });
    toggleMembersModal();
    alert("Connecting instantly with " + targetUser + "...! 💞");
}

socket.on('friend_added_success', function(data) {
    if (current_user === data.user1 || current_user === data.user2) {
        let friend = (current_user === data.user1) ? data.user2 : data.user1;
        window.location.href = "/pm/" + friend;
    }
});

function leaveRoom(){
    socket.emit('leave_room', {
        username: current_user,
        room: "{{ room }}"
    });
    window.location.href = "/";
}
</script>
</body>
</html>
