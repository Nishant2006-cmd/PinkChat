<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINK CHAT</title>
    <!-- Bootstrap CSS for layout structures -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffccd5; /* Matching aesthetic pink background */
            color: #333;
            height: 100vh;
        }

        .chat-container {
            max-width: 800px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            box-shadow: 0px 8px 30px rgba(255, 77, 109, 0.15);
        }

        .chat-header {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .btn-leave {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-leave:hover {
            background: white;
            color: #ff4d6d;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fff5f6; /* Super soft inner room background */
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Base chat bubble alignment styling */
        .message {
            padding: 12px 16px;
            border-radius: 18px;
            width: fit-content;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            background: #ffffff; 
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        /* Style for when current user sends a message */
        .message.my-msg {
            background: #ff4d6d;
            color: white;
            border-radius: 18px;
            border-bottom-right-radius: 4px;
            border-bottom-left-radius: 18px;
            align-self: flex-end;
        }

        .message.my-msg b {
            color: #ffe5ec !important;
        }

        .message b {
            color: #ff4d6d;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 4px;
        }

        .message img {
            width: 100%;
            max-width: 250px;
            border-radius: 12px;
            margin-top: 5px;
            margin-bottom: 5px;
            display: block;
        }

        /* Form footer matching your original background styling rules */
        .message-form {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #ffffff;
            border-top: 1px solid #ffe5ec;
        }

        /* Standard buttons matched to theme */
        .message-form button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .message-form button:hover {
            background: #ff758f;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-thumb {
            background-color: #ffccd5;
            border-radius: 10px;
        }
        /* Styles the text message input field */
#message_input {
    flex: 1;
    padding: 12px 20px;
    border: 2px solid #ffe5ec;
    border-radius: 25px; /* Makes it a clean pill shape */
    outline: none;
    font-size: 0.95rem;
    transition: all 0.2s ease;
}

#message_input:focus {
    border-color: #ff4d6d; /* Glows pink when you click it */
    background-color: #fffdfd;
}

/* Styles the default browser "Choose File" button container */
#image_input {
    padding: 8px;
    background: #fff5f6;
    border: 2px dashed #ffe5ec; /* Gives it a cute dashed border vibe */
    border-radius: 15px;
    cursor: pointer;
    font-size: 0.85rem;
    color: #ff4d6d;
    max-width: 220px; /* Keeps it from stretching too wide */
}

/* Customizes the actual inner button inside the file input browser */
#image_input::file-selector-button {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    margin-right: 10px;
    transition: background 0.2s;
}

#image_input::file-selector-button:hover {
    background: #ff758f;
}
    </style>
</head>
<body>

<div class="chat-container">

    <!-- Header Section -->
    <div class="chat-header">
        <h2>💞 Room: {{ room }}</h2>
        <button class="btn-leave" onclick="leaveRoom()">Leave</button>
    </div>

    <!-- Messages Window -->
    <div id="messages" class="messages">
        {% for message in messages %}
            <div class="message {% if message.sender == username %}my-msg{% endif %}">
                <b>{{ message.sender }}:</b>
                <br>
                {% if message.image %}
                    <img src="{{ message.image }}">
                    <br>
                {% endif %}
                {{ message.text }}
            </div>
        {% endfor %}
    </div>

    <!-- Message Inputs Footer Section (RESTORED EXACTLY AS ORIGINAL) -->
    <form id="message_input_form" class="message-form">
        <input
            type="text"
            id="message_input"
            placeholder="Enter message..."
            accept="image/*"
        >

        <input
            type="file"
            id="image_input"
            accept="image/*"
        >
    
        <button type="submit">
            SEND
        </button>
        
    </form>

</div>

<!-- Realtime Scripts Implementation -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io();

// Auto-scroll logic initialization to view recent messages immediately
const messagesContainer = document.getElementById('messages');
messagesContainer.scrollTop = messagesContainer.scrollHeight;

socket.emit('join_personal_room', {
    username: "{{ username }}"
});

socket.on('connect', function(){
    console.log("CONNECTED");
    socket.emit('join_room', {
        username: "{{ username }}",
        room: "{{ room }}"
    });
});

function leaveRoom(){
    socket.emit('leave_room', {
        username: "{{ username }}",
        room: "{{ room }}"
    });
    window.location.href = "/";
}

// RESTORED JAVASCRIPT LOGIC EXACTLY AS ORIGINAL
document.getElementById('message_input_form').onsubmit = function(e){
    e.preventDefault();

    let message = document.getElementById('message_input').value;
    let imageInput = document.getElementById('image_input');
    let file = imageInput.files[0];

    if(file){
        const reader = new FileReader();
        reader.onload = function(){
            socket.emit('send_message', {
                username: "{{ username }}",
                room: "{{ room }}",
                message: message,
                image: reader.result,
                audio: null
            });
        };
        reader.readAsDataURL(file);
    } else {
        socket.emit('send_message', {
            username: "{{ username }}",
            room: "{{ room }}",
            message: message,
            image: null,
            audio: null
        });
    }

    document.getElementById('message_input').value = '';
    imageInput.value = '';
};

socket.on('receive_message', function(data){
    const messages = document.getElementById('messages');
    const newNode = document.createElement('div');
    
    // Check if message belongs to current active session user for chat positioning styling rules
    const isMe = data.username === "{{ username }}";
    newNode.className = isMe ? "message my-msg" : "message";

    let html = `<b>${data.username}:</b><br>`;
    if(data.image){
        html += `<img src="${data.image}" width="200"><br>`;
    }
    if(data.message){
        html += `${data.message}`;
    }

    newNode.innerHTML = html;
    messages.appendChild(newNode);
    messages.scrollTop = messages.scrollHeight;
});
</script>
</body>
</html>
