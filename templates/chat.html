<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINK CHAT</title>
    <!-- Bootstrap CSS for layout structures -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffccd5; /* Matching aesthetic pink background */
            color: #333;
            height: 100vh;
        }

        .chat-container {
            max-width: 800px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            box-shadow: 0px 8px 30px rgba(255, 77, 109, 0.15);
        }

        .chat-header {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .btn-leave {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-leave:hover {
            background: white;
            color: #ff4d6d;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fff5f6; /* Super soft inner room background */
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Base chat bubble alignment styling */
        .message {
            padding: 12px 16px;
            border-radius: 18px;
            width: fit-content;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            background: #ffffff; 
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        /* Style for when current user sends a message */
        .message.my-msg {
            background: #ff4d6d;
            color: white;
            border-radius: 18px;
            border-bottom-right-radius: 4px;
            border-bottom-left-radius: 18px;
            align-self: flex-end;
        }

        .message.my-msg b {
            color: #ffe5ec !important;
        }

        .message b {
            color: #ff4d6d;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 4px;
        }

        .message img {
            width: 100%;
            max-width: 250px;
            border-radius: 12px;
            margin-top: 5px;
            margin-bottom: 5px;
            display: block;
        }

        /* Form footer matching your original background styling rules */
        .message-form {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #ffffff;
            border-top: 1px solid #ffe5ec;
        }

        /* Standard buttons matched to theme */
        .message-form button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .message-form button:hover {
            background: #ff758f;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-thumb {
            background-color: #ffccd5;
            border-radius: 10px;
        }
        /* Styles the text message input field */
#message_input {
    flex: 1;
    padding: 12px 20px;
    border: 2px solid #ffe5ec;
    border-radius: 25px; /* Makes it a clean pill shape */
    outline: none;
    font-size: 0.95rem;
    transition: all 0.2s ease;
}

#message_input:focus {
    border-color: #ff4d6d; /* Glows pink when you click it */
    background-color: #fffdfd;
}

/* Styles the default browser "Choose File" button container */
#image_input {
    padding: 8px;
    background: #fff5f6;
    border: 2px dashed #ffe5ec; /* Gives it a cute dashed border vibe */
    border-radius: 15px;
    cursor: pointer;
    font-size: 0.85rem;
    color: #ff4d6d;
    max-width: 220px; /* Keeps it from stretching too wide */
}

/* Customizes the actual inner button inside the file input browser */
#image_input::file-selector-button {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    margin-right: 10px;
    transition: background 0.2s;
}

#image_input::file-selector-button:hover {
    background: #ff758f;
}
/* Poore body ya wrapper ko hamesha screen ke andar rakhne ke liye */
.chat-container {
    display: flex;
    flex-direction: column;
    height: 100vh; /* Mobile screen ki full height lega */
    max-width: 800px;
    margin: 0 auto; /* Yeh desktop aur mobile dono par automatically center karega */
    padding: 10px;
    box-sizing: border-box;
}

/* Chat Messages Area - Jo scroll hota hai */
.messages-box {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    margin-bottom: 70px; /* Neeche input bar ke liye fix space */
}

/* Typing / Input Bar Footer - Jo hamesha screen ke bottom par chipka rahega */
.input-bar-container {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%); /* Bilkul center mein alignment ke liye */
    width: 100%;
    max-width: 800px; /* Jitna chat box bada hai utna hi input area hoga */
    background: #fff;
    padding: 10px;
    box-sizing: border-box;
    display: flex;
    gap: 8px;
    align-items: center;
}

/* Input text area ko screen ke hisab se stretch karne ke liye */
.input-bar-container input[type="text"] {
    flex: 1;
    min-width: 0; /* Mobile par width collapse hone se bachayega */
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ffb6c1;
}
    </style>
</head>
<body>
<div class="room-header" style="display: flex; justify-content: space-between; align-items: center;">
    <h2>💞 Room: <span id="room-name-display">{{ room_name }}</span></h2>
    <button onclick="toggleMembersModal()" style="background: rgba(255,255,255,0.3); border: none; padding: 5px 10px; border-radius: 15px; color: white; cursor: pointer;">
        👥 <span id="live-count">0</span> Live
    </button>
</div>

<div id="membersModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 15px rgba(0,0,0,0.2); z-index: 1000; width: 280px;">
    <h3>Active Members</h3>
    <ul id="members-list-ul" style="list-style: none; padding: 0;"></ul>
    <button onclick="toggleMembersModal()" style="background: #ff69b4; color: white; border: none; padding: 5px 10px; border-radius: 5px; margin-top: 10px; width: 100%;">Close</button>
</div>
<div class="chat-container">

    <!-- Header Section -->
    <div class="chat-header">
        <h2>💞 Room: {{ room }}</h2>
        <button class="btn-leave" onclick="leaveRoom()">Leave</button>
    </div>

    <!-- Messages Window -->
    <div id="messages" class="messages">
        {% for message in messages %}
            <div class="message {% if message.sender == username %}my-msg{% endif %}">
                <b>{{ message.sender }}:</b>
                <br>
                {% if message.image %}
                    <img src="{{ message.image }}">
                    <br>
                {% endif %}
                {{ message.text }}
            </div>
        {% endfor %}
    </div>

    <!-- Message Inputs Footer Section (RESTORED EXACTLY AS ORIGINAL) -->
    <form id="message_input_form" class="message-form">
        <input
            type="text"
            id="message_input"
            placeholder="Enter message..."
            accept="image/*"
        >

        <input
            type="file"
            id="image_input"
            accept="image/*"
        >
    
        <button type="submit">
            SEND
        </button>
        
    </form>

</div>

<!-- Realtime Scripts Implementation -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io();

// Flask se current login user ka naam JavaScript variable mein save kiya
const current_user = "{{ username }}";

// Auto-scroll logic initialization to view recent messages immediately
const messagesContainer = document.getElementById('messages');
if (messagesContainer) {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// BACKEND SE LIVE STATS RECIEVE KARNE KA LOGIC
socket.on('room_stats', function(data) {
    // Count update karo top bar mein
    const liveCountEl = document.getElementById('live-count');
    if (liveCountEl) liveCountEl.innerText = data.count;
    
    // Modal ke andar users ki list dynamic render karo
    let listUl = document.getElementById('members-list-ul');
    if (listUl) {
        listUl.innerHTML = ''; 
        
        data.users.forEach(user => {
            if(user !== current_user) { // Apne aap ko chhod kar baakiyon ke aage add friend button
                listUl.innerHTML += `
                    <li style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <span>${user}</span>
                        <button onclick="sendFriendRequest('${user}')" style="background: #ff1493; color: white; border: none; padding: 2px 8px; border-radius: 12px; font-size: 12px; cursor: pointer;">Add Friend</button>
                    </li>
                `;
            } else {
                listUl.innerHTML += `<li style="margin-bottom: 8px; color: #666;"><span>${user} (You)</span></li>`;
            }
        });
    }
});

function toggleMembersModal() {
    let modal = document.getElementById('membersModal');
    if (modal) {
        modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
    }
}

// JAISE HI CONNECT HO, APNA ROOM JOIN KARO
socket.on('connect', function(){
    console.log("CONNECTED TO SERVER");
    
    // Aapke app.py ke handler (@socketio.on('join')) se match karne ke liye iska naam 'join' rakha hai
    socket.emit('join', {
        username: current_user,
        room: "{{ room }}"
    });

    socket.emit('join_personal_room', {
        username: current_user
    });
});

function leaveRoom(){
    // Aapke app.py ke handler se match karne ke liye iska naam 'leave' rakha hai
    socket.emit('leave', {
        username: current_user,
        room: "{{ room }}"
    });
    window.location.href = "/";
}


// 1. Jab koi Active member list me 'Add Friend' dbaega
function sendFriendRequest(targetUser) {
    // Backend ko direct dosti ka signal bhejo
    socket.emit('add_friend_instant', {
        username: current_user,
        target: targetUser
    });
    
    // Modal ko turant band kar do
    toggleMembersModal();
    alert(targetUser + " ke sath aapka instant PM room open ho raha hai! 💞");
}

// 2. Backend se jab dosti automatic confirm ho jaye, dono users ke screen par ye trigger hoga
socket.on('friend_added_success', function(data) {
    console.log("Instant friendship activated: ", data);
    
    // Automatic PM Room ke andar redirect karne ke liye:
    // Agar dono me se koi bhi active hai, toh use direct us personal room me bhej do!
    if (current_user === data.user1 || current_user === data.user2) {
        window.location.href = "/chat/" + data.room_id; 
    }
});

// MESSAGES SEND KARNE KA LOGIC
document.getElementById('message_input_form').onsubmit = function(e){
    e.preventDefault();

    let message = document.getElementById('message_input').value;
    let imageInput = document.getElementById('image_input');
    let file = imageInput ? imageInput.files[0] : null;

    if(file){
        const reader = new FileReader();
        reader.onload = function(){
            socket.emit('send_message', {
                username: current_user,
                room: "{{ room }}",
                message: message,
                image: reader.result,
                audio: null
            });
        };
        reader.readAsDataURL(file);
    } else {
        socket.emit('send_message', {
            username: current_user,
            room: "{{ room }}",
            message: message,
            image: null,
            audio: null
            });
    }

    document.getElementById('message_input').value = '';
    if (imageInput) imageInput.value = '';
};

// MESSAGE RECIEVE KARNE KA LOGIC
socket.on('receive_message', function(data){
    const messages = document.getElementById('messages');
    if (!messages) return;
    
    const newNode = document.createElement('div');
    
    // Check if message belongs to current active session user
    const isMe = data.username === current_user;
    newNode.className = isMe ? "message my-msg" : "message";

    let html = `<b>${data.username}:</b><br>`;
    if(data.image){
        html += `<img src="${data.image}" width="200"><br>`;
    }
    if(data.message){
        html += `${data.message}`;
    }

    newNode.innerHTML = html;
    messages.appendChild(newNode);
    messages.scrollTop = messages.scrollHeight;
});
</script>
</body>
</html>
</body>
</html>
