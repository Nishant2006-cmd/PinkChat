<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkchat - Login</title>
    <!-- Moved Bootstrap link to the HEAD where it belongs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Matches your signup page background */
        .pink-bg {
            background-color: #ffccd5; /* Soft, cute pink */
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        /* Style the login form container */
        .login-form-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
        }
    </style>
</head>
<body>

  <!-- Background wrapper -->
  <div class="pink-bg">
    
    <div class="text-center mb-4">
        <h1 class="display-4 fw-bold text-danger-emphasis">PINK CHAT</h1>
        <h2>Login</h2>
        <h3 class="text-danger fs-5 mt-2">{{ message }}</h3>
    </div>

    <!-- Login Form styled with Bootstrap -->
    <div class="login-form-container">
        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label">Username:</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Password:</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn text-white w-100 fw-bold" style="background-color: #ff4d6d;">SUBMIT</button>
        </form>
    </div>

  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
